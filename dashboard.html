<!DOCTYPE html>
<html lang="en">
<head>

<title>Analytics Dashboard</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#0f0f0f;
font-family:'Segoe UI',sans-serif;
color:white;
}

/* Navbar */

.navbar{
background:#000 !important;
box-shadow:0 5px 15px rgba(0,0,0,0.6);
}

/* Dashboard Title */

.dashboard-title{
text-align:center;
margin-top:50px;
margin-bottom:40px;
}

/* Glass Cards */

.glass-card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
text-align:center;
backdrop-filter:blur(10px);
transition:0.4s;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.glass-card:hover{
transform:translateY(-10px);
background:rgba(255,255,255,0.12);
}

/* Counter */

.counter{
font-size:40px;
font-weight:700;
color:#00ffc3;
}

/* Icons */

.icon{
font-size:35px;
margin-bottom:10px;
color:#00ffc3;
}

/* Tableau Section */

.dashboard-box{
margin-top:40px;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* Scroll Animation */

.reveal{
opacity:0;
transform:translateY(40px);
transition:1s all ease;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

/* Footer */

footer{
margin-top:70px;
background:#000;
padding:20px;
text-align:center;
color:#bbb;
}

</style>

</head>

<body>


<!-- Navbar -->

<nav class="navbar navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">Back to Home</a>
</div>
</nav>


<div class="container">

<h2 class="dashboard-title reveal">
Strategic Product Placement Analytics Dashboard
</h2>


<!-- Statistics -->

<div class="row g-4">

<div class="col-md-4 reveal">

<div class="glass-card">

<i class="fa-solid fa-bullhorn icon"></i>

<h5>Total Campaigns</h5>

<div class="counter" data-target="25">0</div>

</div>

</div>


<div class="col-md-4 reveal">

<div class="glass-card">

<i class="fa-solid fa-tags icon"></i>

<h5>Brands Analyzed</h5>

<div class="counter" data-target="15">0</div>

</div>

</div>


<div class="col-md-4 reveal">

<div class="glass-card">

<i class="fa-solid fa-chart-line icon"></i>

<h5>Sales Increase</h5>

<div class="counter" data-target="35">0</div> %

</div>

</div>

</div>


<!-- Tableau Dashboard -->

<div class="dashboard-box reveal">

<h4 class="text-center mb-4">Interactive Tableau Visualization</h4>

<div class='tableauPlaceholder' id='viz1772869919367' style='position: relative'>

<object class='tableauViz' style='display:none;'>

<param name='host_url' value='https://public.tableau.com/' />
<param name='embed_code_version' value='3' />
<param name='name' value='Book2_17728698953120/Dashboard1' />
<param name='tabs' value='no' />
<param name='toolbar' value='yes' />

</object>

</div>

</div>

</div>


<footer>

<p>© 2026 Strategic Product Placement Analysis | Data Visualization Project</p>

</footer>


<script>

/* Tableau Embed */

var divElement=document.getElementById('viz1772869919367');
var vizElement=divElement.getElementsByTagName('object')[0];

vizElement.style.width="100%";
vizElement.style.height="750px";

var scriptElement=document.createElement('script');
scriptElement.src='https://public.tableau.com/javascripts/api/viz_v1.js';
vizElement.parentNode.insertBefore(scriptElement,vizElement);


/* Counter Animation */

const counters=document.querySelectorAll('.counter');

counters.forEach(counter=>{

const updateCounter=()=>{

const target=+counter.getAttribute('data-target');
const count=+counter.innerText;

const increment=target/100;

if(count<target){
counter.innerText=Math.ceil(count+increment);
setTimeout(updateCounter,20);
}else{
counter.innerText=target;
}

};

updateCounter();

});


/* Scroll Reveal */

window.addEventListener("scroll",function(){

const reveals=document.querySelectorAll(".reveal");

for(let i=0;i<reveals.length;i++){

const windowHeight=window.innerHeight;
const elementTop=reveals[i].getBoundingClientRect().top;

if(elementTop<windowHeight-100){
reveals[i].classList.add("active");
}

}

});

</script>


</body>
</html>
